<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة محمد زايد - النسخة السحابية</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        // ⚠️ استبدل هذه البيانات بالبيانات التي نسختها من Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyDummyExampleReplaceWithYourActualKey",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:0000000000000000"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        
        console.log("✅ Firebase connected successfully");
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .page { background: #1e293b; border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid #facc15; display: none; }
        .page.active { display: block; }
        .btn { padding: 12px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-gold { background: #facc15; color: #1e293b; }
        .btn-admin { background: #8b5cf6; color: white; }
        .btn-red { background: #dc2626; color: white; }
        .btn-gray { background: #475569; color: white; }
        .btn-excel { background: #1d7e3a; color: white; }
        .btn-green { background: #22c55e; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: none; background: #f1f5f9; text-align: right; }
        .welcome-box { background: linear-gradient(135deg, #facc15, #ff8c00); color: #1e293b; padding: 20px; border-radius: 30px; text-align: center; margin-bottom: 20px; }
        .logo { text-align: center; font-size: 48px; margin-bottom: 20px; }
        table { width: 100%; color: white; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: center; }
        .status { background: #0f172a; padding: 15px; border-radius: 20px; margin: 10px 0; text-align: center; color: #facc15; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-group { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .radio-group label { background: rgba(218,165,32,0.15); padding: 8px 15px; border-radius: 30px; cursor: pointer; color: #facc15; }
        .loading { text-align: center; color: #facc15; padding: 20px; }
    </style>
</head>
<body>

<div class="container">

<!-- صفحة التسجيل -->
<div id="pageRegister" class="page active">
    <div class="logo">🌟</div>
    <div class="welcome-box"><h2>🌟 منصة محمد زايد 🌟</h2><p>يرجى إكمال التسجيل</p></div>
    
    <input type="text" id="regName" placeholder="الاسم الكامل *">
    <input type="email" id="regEmail" placeholder="البريد الإلكتروني *">
    <input type="tel" id="regWhatsapp" placeholder="واتساب *">
    <input type="text" id="regCountry" placeholder="البلد *">
    <input type="password" id="regKey" placeholder="مفتاح الدخول" value="00001">
    
    <div class="radio-group">
        <label><input type="radio" name="userCategory" value="طالب"> 🎓 طالب</label>
        <label><input type="radio" name="userCategory" value="أستاذ"> 👨‍🏫 أستاذ</label>
        <label><input type="radio" name="userCategory" value="باحث"> 🔬 باحث</label>
    </div>
    
    <button class="btn btn-gold" onclick="registerUser()">🔑 دخول إلى المنصة</button>
    <button class="btn btn-admin" onclick="showAdminLogin()">👑 دخول المشرف</button>
    
    <div class="status">💻 تصميم: محمد زايد | التسجيل في السحاب</div>
</div>

<!-- الصفحة الرئيسية -->
<div id="pageHome" class="page">
    <div class="logo">🌟</div>
    <div class="welcome-box"><h2>🌟 مرحباً <span id="welcomeName"></span> 🌟</h2></div>
    <button class="btn btn-gray" onclick="showProfile()">👤 ملفي الشخصي</button>
    <button class="btn btn-red" onclick="logout()">🚪 تسجيل الخروج</button>
</div>

<!-- صفحة تسجيل الدخول للمشرف -->
<div id="pageAdminLogin" class="page">
    <div class="welcome-box"><h2>👑 دخول المشرف</h2></div>
    <input type="password" id="adminPassInput" placeholder="كلمة مرور المشرف">
    <button class="btn btn-admin" onclick="enterAdmin()">🔓 دخول</button>
    <button class="btn btn-gray" onclick="showRegister()">🔙 العودة</button>
</div>

<!-- لوحة تحكم المشرف -->
<div id="pageAdmin" class="page">
    <div class="welcome-box"><h2>👑 لوحة تحكم المشرف</h2></div>
    
    <div class="flex-row" style="margin-bottom:20px; justify-content:center;">
        <button class="btn btn-gray" style="width:auto;" onclick="showAdminUsers()">👥 المستخدمين</button>
        <button class="btn btn-gray" style="width:auto;" onclick="showAdminKeys()">🔑 المفاتيح</button>
    </div>
    
    <div id="adminUsersPanel">
        <div id="adminStats" class="status"></div>
        <div id="adminUsersList" style="max-height: 400px; overflow-y: auto; margin: 15px 0;"></div>
        <button class="btn btn-excel" onclick="exportToExcel()">📊 تصدير إلى Excel</button>
        <button class="btn btn-red" onclick="deleteAllUsers()">🗑️ مسح جميع المستخدمين</button>
    </div>
    
    <div id="adminKeysPanel" style="display:none;">
        <div style="background:#0f172a; padding:15px; border-radius:20px; margin-bottom:15px;">
            <h3 style="color:#facc15;">المفاتيح الحالية</h3>
            <div id="keysList" class="flex-row" style="margin:10px 0;"></div>
            <div class="flex-row">
                <input type="text" id="newKeyInput" placeholder="مفتاح جديد">
                <button class="btn btn-gold" onclick="addNewKey()" style="width:auto; flex:1;">➕ إضافة</button>
            </div>
            <div class="flex-row" style="margin-top:15px;">
                <input type="password" id="newAdminPassInput" placeholder="كلمة مرور جديدة للمشرف">
                <button class="btn btn-gold" onclick="changeAdminPassword()" style="width:auto; flex:1;">🔒 تغيير</button>
            </div>
        </div>
    </div>
    
    <button class="btn btn-red" onclick="logoutAdmin()" style="margin-top:15px;">🚪 خروج</button>
</div>

</div>

<script>
// ======================= البيانات الأساسية =======================
let currentUser = null;
let validKeys = JSON.parse(localStorage.getItem('validKeys') || '["00001"]');
let adminPassword = localStorage.getItem('adminPass') || "000012";
let allUsers = [];

// ======================= التسجيل في Firebase =======================
async function registerUser() {
    console.log("✅ تم الضغط على زر التسجيل");
    
    let name = document.getElementById('regName').value.trim();
    let email = document.getElementById('regEmail').value.trim();
    let whatsapp = document.getElementById('regWhatsapp').value.trim();
    let country = document.getElementById('regCountry').value.trim();
    let key = document.getElementById('regKey').value.trim();
    let category = document.querySelector('input[name="userCategory"]:checked')?.value || "طالب";
    
    console.log("الاسم:", name);
    
    if(!name || !email || !whatsapp || !country) {
        alert("❌ أكمل جميع الحقول");
        return;
    }
    
    if(!validKeys.includes(key)) {
        alert("❌ مفتاح خاطئ. المفتاح الصحيح هو: 00001");
        return;
    }
    
    let userData = {
        name: name,
        email: email,
        whatsapp: whatsapp,
        country: country,
        category: category,
        date: new Date().toLocaleString(),
        timestamp: Date.now()
    };
    
    try {
        // حفظ في Firebase
        const docRef = await addDoc(collection(window.db, 'users'), userData);
        userData.id = docRef.id;
        currentUser = userData;
        
        // حفظ في localStorage للجلسة الحالية
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        
        console.log("✅ تم التسجيل في Firebase بنجاح");
        
        document.getElementById('welcomeName').innerHTML = currentUser.name;
        showPage('pageHome');
        alert("✅ مرحباً " + name + "! تم تسجيل الدخول بنجاح.");
        
    } catch(e) {
        console.error("❌ خطأ في Firebase:", e);
        alert("❌ خطأ في الاتصال بقاعدة البيانات. تأكد من إعداد Firebase بشكل صحيح.");
    }
}

// ======================= عرض المستخدمين من Firebase =======================
async function loadAdminUsers() {
    document.getElementById('adminUsersList').innerHTML = '<div class="loading">⏳ جاري تحميل المستخدمين...</div>';
    
    try {
        const querySnapshot = await getDocs(collection(window.db, 'users'));
        allUsers = [];
        querySnapshot.forEach((doc) => {
            allUsers.push({ id: doc.id, ...doc.data() });
        });
        
        // ترتيب حسب التاريخ (الأحدث أولاً)
        allUsers.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        document.getElementById('adminStats').innerHTML = `👥 إجمالي المسجلين: ${allUsers.length}`;
        
        if(allUsers.length === 0) {
            document.getElementById('adminUsersList').innerHTML = '<p style="text-align:center; color:#aaa;">لا يوجد مستخدمين مسجلين</p>';
            return;
        }
        
        let html = '<table>';
        html += '<tr style="background:#334155;"><th>#</th><th>الاسم</th><th>البريد</th><th>واتساب</th><th>البلد</th><th>الفئة</th><th>التاريخ</th><tr>';
        
        allUsers.forEach((user, index) => {
            html += `<tr>
                        <td style="padding:8px;">${index+1}</td>
                        <td style="padding:8px;">${user.name || '-'}</td>
                        <td style="padding:8px;">${user.email || '-'}</td>
                        <td style="padding:8px;">${user.whatsapp || '-'}</td>
                        <td style="padding:8px;">${user.country || '-'}</td>
                        <td style="padding:8px;">${user.category || '-'}</td>
                        <td style="padding:8px;">${user.date || '-'}</td>
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('adminUsersList').innerHTML = html;
        
    } catch(e) {
        console.error("❌ خطأ في تحميل المستخدمين:", e);
        document.getElementById('adminUsersList').innerHTML = '<p style="color:red;">❌ خطأ في تحميل المستخدمين. تأكد من إعداد Firebase.</p>';
    }
}

// ======================= تصدير إلى Excel =======================
async function exportToExcel() {
    await loadAdminUsers();
    if(allUsers.length === 0) {
        alert("لا يوجد مستخدمين للتصدير");
        return;
    }
    
    let data = [["#", "الاسم", "البريد", "واتساب", "البلد", "الفئة", "التاريخ"]];
    allUsers.forEach((user, index) => {
        data.push([index+1, user.name, user.email, user.whatsapp, user.country, user.category, user.date]);
    });
    
    let ws = XLSX.utils.aoa_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "المستخدمين");
    XLSX.writeFile(wb, `users_${new Date().toLocaleDateString()}.xlsx`);
    alert("✅ تم التصدير");
}

// ======================= حذف جميع المستخدمين من Firebase =======================
async function deleteAllUsers() {
    if(!confirm("⚠️ هل أنت متأكد من حذف جميع المستخدمين نهائياً من قاعدة البيانات؟")) return;
    
    try {
        const querySnapshot = await getDocs(collection(window.db, 'users'));
        for(const docSnap of querySnapshot.docs) {
            await deleteDoc(doc(window.db, 'users', docSnap.id));
        }
        alert("✅ تم حذف جميع المستخدمين");
        await loadAdminUsers();
    } catch(e) {
        console.error("❌ خطأ في الحذف:", e);
        alert("❌ خطأ في حذف المستخدمين");
    }
}

// ======================= إدارة المفاتيح =======================
function loadAdminKeys() {
    let keys = JSON.parse(localStorage.getItem('validKeys') || '["00001"]');
    validKeys = keys;
    let html = '';
    keys.forEach(k => { 
        html += `<span style="background:#facc15; color:#1e293b; padding:5px 12px; border-radius:20px; margin:5px;">🔑 ${k}</span>`; 
    });
    document.getElementById('keysList').innerHTML = html;
}

function addNewKey() {
    let newKey = document.getElementById('newKeyInput').value.trim();
    if(!newKey) { alert("أدخل مفتاحاً"); return; }
    if(validKeys.includes(newKey)) { alert("المفتاح موجود بالفعل"); return; }
    
    validKeys.push(newKey);
    localStorage.setItem('validKeys', JSON.stringify(validKeys));
    loadAdminKeys();
    document.getElementById('newKeyInput').value = '';
    alert(`✅ تم إضافة المفتاح: ${newKey}`);
}

function changeAdminPassword() {
    let newPass = document.getElementById('newAdminPassInput').value.trim();
    if(!newPass) { alert("أدخل كلمة مرور جديدة"); return; }
    
    adminPassword = newPass;
    localStorage.setItem('adminPass', adminPassword);
    alert("✅ تم تغيير كلمة مرور المشرف");
}

// ======================= دوال التحكم في الصفحات =======================
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function showRegister() { showPage('pageRegister'); }
function showAdminLogin() { showPage('pageAdminLogin'); }
function showProfile() { 
    if(currentUser) {
        alert(`👤 ${currentUser.name}\n📧 ${currentUser.email}\n📱 ${currentUser.whatsapp}\n🌍 ${currentUser.country}\n🏷️ ${currentUser.category}`);
    } else {
        alert("الرجاء تسجيل الدخول أولاً");
    }
}
function logout() { 
    currentUser = null; 
    localStorage.removeItem('currentUser'); 
    showPage('pageRegister'); 
}
function logoutAdmin() { showPage('pageRegister'); }

function showAdminUsers() {
    document.getElementById('adminUsersPanel').style.display = 'block';
    document.getElementById('adminKeysPanel').style.display = 'none';
    loadAdminUsers();
}

function showAdminKeys() {
    document.getElementById('adminUsersPanel').style.display = 'none';
    document.getElementById('adminKeysPanel').style.display = 'block';
    loadAdminKeys();
}

function enterAdmin() {
    let pass = document.getElementById('adminPassInput').value;
    if(pass === adminPassword) {
        loadAdminUsers();
        showPage('pageAdmin');
    } else {
        alert("❌ كلمة مرور خاطئة");
    }
}

// ======================= استعادة الجلسة =======================
let savedUser = localStorage.getItem('currentUser');
if(savedUser) {
    try {
        currentUser = JSON.parse(savedUser);
        document.getElementById('welcomeName').innerHTML = currentUser.name;
        showPage('pageHome');
    } catch(e) { 
        showPage('pageRegister');
    }
}

console.log("✅ المنصة جاهزة");
console.log("✅ مفتاح الدخول الافتراضي: 00001");
console.log("✅ كلمة مرور المشرف الافتراضية: 000012");
console.log("✅ Firebase متصل - المستخدمين يحفظون في السحاب");
</script>
</body>
</html>
